name: Deploy
on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install        # 1. installs dependencies
      - run: npm run build      # 2. compiles JSX → dist/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist            # 3. grabs the dist folder
      - uses: actions/deploy-pages@v4
        id: deployment          # 4. puts it on GitHub Pages
